name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: |
          cd server
          pnpm install
      
      - name: Restart service
        run: sudo systemctl restart camanchaca-cms
      
      - name: Verify deployment
        run: |
          sleep 5
          sudo systemctl status camanchaca-cms --no-pager
