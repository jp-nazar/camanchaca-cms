name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Deploy to /opt/camanchaca-cms
        run: |
          cd /opt/camanchaca-cms
          git fetch origin main
          git reset --hard origin/main
      
      - name: Install dependencies
        run: |
          cd /opt/camanchaca-cms/server
          pnpm install
      
      - name: Restart service
        run: sudo systemctl restart camanchaca-cms
      
      - name: Verify deployment
        run: |
          sleep 5
          sudo systemctl status camanchaca-cms --no-pager
